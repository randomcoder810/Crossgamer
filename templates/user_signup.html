{% extends "layout.html" %}
{% block title %}Sign Up{% endblock %}

{% block content %}
<div class="row justify-content-center py-4">
  <div class="col-md-6 col-lg-5">
    <div class="m3-card">
      <div class="m3-card-body">
        <h4 class="mb-3">Create Account</h4>
        <form method="post">
          <div class="mb-3">
            <label class="form-label">Name</label>
            <input type="text" class="form-control m3-field" name="name" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" class="form-control m3-field" name="email" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" class="form-control m3-field" name="password" required>
          </div>
          <div class="d-flex justify-content-between align-items-center">
            <button class="m3-btn m3-btn-primary" type="submit">Sign Up</button>
            <a href="{{ url_for('user_login') }}">Already have an account?</a>
          </div>
        </form>
      </div>
    </div>
  </div>
  </div>
{% endblock %}
